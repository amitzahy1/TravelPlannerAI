name = "travelplannerai-api"
main = "src/index.ts"
compatibility_date = "2024-01-17"
compatibility_flags = [ "nodejs_compat" ]

# Non-secret config. Secrets (GEMINI_API_KEY, GEMINI_PREMIUM_KEY, OPENROUTER_API_KEY,
# GROQ_API_KEY, FIREBASE_SERVICE_ACCOUNT, AUTH_SECRET) are managed via `wrangler secret put`.
[vars]
FIREBASE_PROJECT_ID = "travelplannerai-ffc6d"
#
# Renamed from "travelplannerai" to "travelplannerai-api" because the old
# name kept being overwritten from outside (5+ silent overrides on
# 2026-04-23 replaced the worker with a static React build). The new URL
# is https://travelplannerai-api.amitzahy1.workers.dev and is wired as
# the default in services/aiService.ts.

# Cloudflare KV — caches the dynamically-synced AI model chains. Populated
# daily by the cron trigger below (see [triggers]) which hits /api/sync-models
# to fetch each provider's current catalog. Frontend reads from /api/chains
# which serves the cached JSON.
[[kv_namespaces]]
binding = "AI_CHAINS_CACHE"
id = "20708475f43a401c91b56ab6451c911b"

# Daily resync of the AI model chain config — 04:00 UTC (07:00 Israel time).
# The scheduled() handler in src/index.ts triggers the same logic as the
# /api/sync-models endpoint, fetching Groq + OpenRouter + Gemini catalogs
# and rebuilding the chain. Manual sync is also available via the admin
# "סנכרן מודלים" button in ModelHealthPanel.
[triggers]
crons = [ "0 4 * * *" ]
