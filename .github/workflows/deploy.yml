name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # GEMINI key intentionally NOT injected here — every AI call goes
          # through the Cloudflare Worker, which holds its own secret. Keeping
          # the key out of the bundle prevents leakage from the public site.
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          # Google Maps key for the Places API (New) "Refresh from Google"
          # feature on saved + AI-recommended places. SAFE TO INCLUDE IN
          # THE BUNDLE only because the key has HTTP-referrer restrictions
          # in Cloud Console limiting it to your GitHub Pages domain, plus
          # API restrictions (Places API New + Maps Embed only) and a hard
          # 200/day Place Details quota cap.
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Deploy the Cloudflare Worker on every push so production stays in
  # sync with workers/ source. Pushes the GEMINI_API_KEY secret each
  # run so rotating the key in GitHub Secrets propagates without manual
  # `wrangler secret put`. Other Worker secrets (Firebase service
  # account etc.) are managed in the Cloudflare dashboard.
  deploy-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Worker dependencies
        run: npm install
        working-directory: workers

      - name: Push GEMINI_API_KEY secret
        run: echo -n "${{ secrets.GEMINI_API_KEY }}" | npx wrangler secret put GEMINI_API_KEY
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Premium (billing-enabled) Gemini key. Used only when the request
      # body has tier='paid' (the trip owner's monthly first run on
      # restaurants/attractions). All other calls keep using GEMINI_API_KEY.
      - name: Push GEMINI_PREMIUM_KEY secret
        run: echo -n "${{ secrets.GEMINI_PREMIUM_KEY }}" | npx wrangler secret put GEMINI_PREMIUM_KEY
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
          command: deploy
